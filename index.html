<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Backend Test</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Oracle & Go Test</h2>
    <button id="fetchBtn">Backend'e İstek At</button>
    <p id="result">Mesaj bekleniyor...</p>
</div>

<script>
    const btn = document.getElementById('fetchBtn');
    const resultPara = document.getElementById('result');

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        resultPara.innerText = "İstek gönderiliyor...";

        try {
            // Senin Oracle Sunucu IP'n ve Portun
            const response = await fetch("http://141.147.13.77:8080/deneme", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ isim: "Eray" }),
            });

            if (!response.ok) {
                throw new Error("Sunucu hatası: " + response.status);
            }

            const data = await response.json();
            // Backend'den gelen 'mesaj' alanını yazdırıyoruz
            resultPara.innerText = data.mesaj;
            resultPara.style.color = "green";
        } catch (error) {
            console.error("Hata:", error);
            resultPara.innerText = "Hata: Backend'e ulaşılamadı. (CORS veya Port hatası olabilir)";
            resultPara.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
