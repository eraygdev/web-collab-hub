<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Büşra'm İçin</title>
    <style>
        /* Genel Arka Plan Ayarları */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        /* Ana Mesaj Kutusu */
        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            width: 80%;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        p {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Yağan Kalplerin Stili */
        .heart {
            position: absolute;
            top: -10%;
            color: #ff4d4d;
            font-size: 20px;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Seni Çok Seviyorum Büşra ❤️</h1>
        <p>Hayatımın en güzel detayı sensin...</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Rastgele kalp emojileri
            const types = ['❤️', '💖', '💕', '💗', '💘'];
            heart.innerText = types[Math.floor(Math.random() * types.length)];
            
            // Rastgele pozisyon ve hız
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s"; 
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + "px";

            document.body.appendChild(heart);

            // Ekran dışına çıkan kalpleri temizle
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Sürekli kalp oluştur
        setInterval(createHeart, 300);
    </script>
</body>
</html>
