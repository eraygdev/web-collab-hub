<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selam Tuğçe!</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #fff0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .selam-yazisi {
            color: #ff69b4;
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            animation: buyu-kucul 2s ease-in-out infinite alternate;
        }

        .komik-gif {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes buyu-kucul {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @media (max-width: 600px) {
            .selam-yazisi { font-size: 3rem; }
            .komik-gif { width: 250px; }
        }
    </style>
</head>
<body>

    <div class="selam-yazisi">
        selam tugcee
    </div>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6_jwzXlP4WKsx6ne7ZzmKIFVCDjzWgpkcNg&s" 
         alt="Komik Kedi" 
         class="komik-gif">

</body>
</html>
