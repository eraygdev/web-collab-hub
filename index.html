<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşkın Çapraz Hali</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fe9a9e, #fecfef);
            background-size: 400% 400%;
            animation: backgroundGradient 15s ease infinite;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes backgroundGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .heart-rain {
            position: absolute;
            color: rgba(255, 20, 147, 0.4);
            font-size: 1.5rem;
            animation: heartFall 4s linear infinite;
            top: -50px;
            z-index: 1;
        }

        @keyframes heartFall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* ANA KAPSAYICI */
        .container {
            display: flex;
            flex-direction: column; /* İsimleri alt alta sıralar */
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        .isim {
            color: #fff;
            font-size: clamp(2.5rem, 10vw, 5rem); /* Dinamik boyut: Mobilde küçük, PC'de büyük */
            font-weight: 900;
            text-transform: lowercase;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
            margin: 10px 0;
        }

        /* ÇAPRAZ ETKİSİ İÇİN */
        .tugce {
            transform: translateX(20%) rotate(5deg);
        }

        .zeynep {
            transform: translateX(-20%) rotate(-5deg);
        }

        .orta-kalp {
            font-size: clamp(5rem, 20vw, 12rem); /* Kalp de ekrana göre küçülür */
            color: #ff1493;
            text-shadow: 0 0 50px rgba(255, 20, 147, 0.9);
            animation: beat 0.8s infinite alternate;
            cursor: pointer;
            line-height: 1;
        }

        @keyframes beat {
            to { transform: scale(1.15); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #ff1493; }
            to { text-shadow: 0 0 20px #fff, 0 0 40px #ff69b4; }
        }

        /* Mobil için ufak rötuş */
        @media (max-width: 600px) {
            .tugce, .zeynep {
                transform: translateX(0) rotate(0); /* Mobilde çok daralırsa çaprazlığı azaltıyoruz */
            }
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-rain');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(createHeart, 200);
    </script>

    <div class="container">
        <div class="isim tugce">Tuğçe</div>
        <div class="orta-kalp">❤️</div>
        <div class="isim zeynep">Zeynep</div>
    </div>

</body>
</html>
